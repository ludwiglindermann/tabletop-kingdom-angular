<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="form-container">
        <h2 class="text-center mb-4">Recuperar Contraseña</h2>
        <p class="text-center mb-4" style="opacity: 0.7;">
          Ingresa tu correo y tu nueva contraseña
        </p>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" [(ngModel)]="correo"
            class="form-control" placeholder="tucorreo@email.com"/>
          <small class="text-danger">{{ errorCorreo }}</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" [(ngModel)]="nuevaPassword"
            class="form-control" placeholder="Entre 6 y 18 caracteres"/>
          <small class="text-danger">{{ errorPassword }}</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Repetir nueva contraseña</label>
          <input type="password" [(ngModel)]="confirmarPassword"
            class="form-control" placeholder="Repite tu nueva contraseña"/>
          <small class="text-danger">{{ errorConfirmar }}</small>
        </div>

        <div class="d-flex gap-3 justify-content-center mt-4">
          <button (click)="recuperar()" class="btn-registro">Actualizar</button>
          <button (click)="limpiar()" class="btn-limpiar">Limpiar</button>
        </div>

        <div class="mensaje-exito mt-3"
          [style.display]="mensajeExito ? 'block' : 'none'">
          {{ mensajeExito }}
        </div>

      </div>
    </div>
  </div>
</main>
