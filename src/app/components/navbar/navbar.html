<header>
  <div class="logo-area">
    <span class="crown">♟</span>
    <h1>TableTop Kingdom</h1>
    <p class="tagline">Tu reino de juegos de mesa</p>
    <div class="sesion-botones mt-3">

      <ng-container *ngIf="usuarioActivo; else sinSesion">
        <span class="sesion-nombre me-3">
          <span *ngIf="usuarioActivo.rol === 'admin'">👑</span>
          <span *ngIf="usuarioActivo.rol !== 'admin'">👤</span>
          {{ usuarioActivo.nombre }}
        </span>
        <a routerLink="/admin" class="btn-registro me-2"
          *ngIf="usuarioActivo.rol === 'admin'">Panel Admin</a>
        <a routerLink="/perfil" class="btn-limpiar me-2">Mi perfil</a>
        <button (click)="cerrarSesion()" class="btn-limpiar">Cerrar sesión</button>
      </ng-container>

      <ng-template #sinSesion>
        <a routerLink="/login" class="btn-registro me-2">Iniciar sesión</a>
        <a routerLink="/registro" class="btn-limpiar">Crear cuenta</a>
      </ng-template>

    </div>
  </div>
</header>

<nav class="breadcrumb">
  <a routerLink="/">← Inicio</a>
  <a routerLink="/login" *ngIf="!usuarioActivo">Login</a>
  <a routerLink="/registro" *ngIf="!usuarioActivo">Registro</a>
  <a routerLink="/recuperar" *ngIf="!usuarioActivo">Recuperar contraseña</a>
  <a routerLink="/perfil" *ngIf="usuarioActivo">Mi perfil</a>
  <a routerLink="/admin" *ngIf="usuarioActivo?.rol === 'admin'">Panel Admin</a>
  <a routerLink="/carrito">🛒 Carrito</a>
</nav>
