<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="form-container">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" [(ngModel)]="correo"
            class="form-control" placeholder="tucorreo@email.com"/>
          <small class="text-danger">{{ errorCorreo }}</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" [(ngModel)]="password"
            class="form-control" placeholder="Tu contraseña"/>
          <small class="text-danger">{{ errorPassword }}</small>
        </div>

        <div class="text-danger text-center mb-3">{{ errorLogin }}</div>

        <div class="d-flex gap-3 justify-content-center mt-4">
          <button (click)="iniciarSesion()" class="btn-registro">Ingresar</button>
          <button (click)="limpiar()" class="btn-limpiar">Limpiar</button>
        </div>

        <div class="text-center mt-3">
          <a routerLink="/recuperar" style="color: var(--color-acento);">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </div>
    </div>
  </div>
</main>
