<main>
  <section class="intro" *ngIf="categoriaData">
    <h2>{{ categoriaData.nombre }}</h2>
    <p>{{ categoriaData.descripcion }}</p>
  </section>

  <div *ngIf="mensajeAgregado" class="text-center py-2"
    style="background-color: var(--color-tarjeta); color: #4caf50; font-weight: bold;">
    {{ mensajeAgregado }}
  </div>

  <section class="container mt-4" *ngIf="categoriaData">
    <div class="row g-4 justify-content-center">

      <div class="col-12 col-md-6 col-lg-4"
        *ngFor="let juego of categoriaData.juegos">
        <article class="game-card">
          <img [src]="juego.imagen" [alt]="juego.nombre" />
          <div class="game-info">
            <h3>{{ juego.nombre }}</h3>
            <p class="description">{{ juego.descripcion }}</p>
            <p class="price">{{ juego.precio }}</p>
            <span class="badge-descuento" *ngIf="juego.descuento">
              {{ juego.textoDescuento }}
            </span>
            <span class="badge-regular" *ngIf="!juego.descuento">
              Precio regular
            </span>
            <div class="mt-3">
              <button (click)="agregarAlCarrito(juego)" class="btn-registro">
                🛒 Agregar al carrito
              </button>
            </div>
          </div>
        </article>
      </div>

    </div>
  </section>

  <section class="intro" *ngIf="!categoriaData">
    <h2>Categoría no encontrada</h2>
    <p>La categoría que buscas no existe.</p>
    <a routerLink="/" class="btn-registro mt-3">Volver al inicio</a>
  </section>

</main>
